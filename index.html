!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asociados P Y A - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        
        .login-gradient {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .card-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }

        /* Fix para evitar parpadeos en el login */
        #app-content { display: none; }
        #login-screen { display: flex; }

        .btn-primary {
            background: #2563eb;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }

        .input-custom {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            transition: all 0.2s;
        }

        .input-custom:focus {
            border-color: #2563eb;
            background: white;
            outline: none;
            ring: 0;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Pantalla de Inicio de Sesión -->
    <div id="login-screen" class="fixed inset-0 login-gradient flex items-center justify-center z-[9999]">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full mx-4">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-blue-500/40">
                    <i class="fas fa-key text-white text-3xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Acceso Privado</h1>
                <p class="text-slate-400 text-sm font-semibold mt-2 uppercase tracking-widest">Asociados P Y A</p>
            </div>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest ml-1">Contraseña de Sistema</label>
                    <input type="password" id="password-input" placeholder="····" 
                        class="w-full px-6 py-5 input-custom rounded-2xl text-center text-2xl font-black tracking-[0.5em]">
                </div>
                <div id="login-error" class="hidden text-red-600 text-xs font-bold text-center bg-red-50 py-3 rounded-xl border border-red-100">
                    <i class="fas fa-exclamation-circle mr-1"></i> Contraseña incorrecta
                </div>
                <button type="submit" class="w-full py-5 btn-primary text-white font-bold rounded-2xl shadow-xl shadow-blue-200 uppercase text-xs tracking-widest">
                    Entrar al Sistema
                </button>
            </form>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div id="app-content">
        <!-- Navegación -->
        <header class="bg-white border-b border-slate-200 px-8 py-4 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-600 p-2 rounded-xl"><i class="fas fa-briefcase text-white"></i></div>
                    <h2 class="text-lg font-extrabold text-slate-800">Panel Gestión P&A</h2>
                </div>
                <div class="flex items-center gap-4">
                    <span id="reloj" class="text-sm font-bold text-slate-500 bg-slate-100 px-4 py-2 rounded-full">00:00:00</span>
                    <button onclick="logout()" class="text-red-500 hover:bg-red-50 p-3 rounded-xl transition-all">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="max-w-7xl mx-auto p-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Ventas Mes</p>
                    <p id="stat-ventas" class="text-2xl font-extrabold text-green-600">$0.00</p>
                </div>
                <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Gastos</p>
                    <p id="stat-gastos" class="text-2xl font-extrabold text-red-600">$0.00</p>
                </div>
                <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Pendiente Cobro</p>
                    <p id="stat-pendientes" class="text-2xl font-extrabold text-blue-600">0</p>
                </div>
                <div class="bg-slate-900 p-6 rounded-3xl shadow-xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Caja Fuerte</p>
                    <p id="stat-caja" class="text-2xl font-extrabold text-white">$0.00</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Registro -->
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-8 rounded-[2rem] card-shadow">
                        <h3 class="text-sm font-black uppercase tracking-widest text-slate-800 mb-6">Nuevo Pedido</h3>
                        <form id="order-form" class="space-y-4">
                            <input type="text" id="cliente" required placeholder="Nombre del Cliente" class="w-full px-5 py-4 input-custom rounded-xl font-bold">
                            <input type="text" id="producto" required placeholder="Producto / Detalle" class="w-full px-5 py-4 input-custom rounded-xl font-bold">
                            <input type="number" id="monto" required placeholder="Monto $" class="w-full px-5 py-4 input-custom rounded-xl font-black text-blue-600 text-xl">
                            <select id="tipo" class="w-full px-5 py-4 input-custom rounded-xl font-bold">
                                <option value="Retiro">Retiro en Local</option>
                                <option value="Domicilio">Envío a Domicilio</option>
                            </select>
                            <button type="submit" class="w-full py-5 btn-primary text-white font-bold rounded-2xl">Registrar</button>
                        </form>
                    </div>

                    <div class="bg-white p-8 rounded-[2rem] card-shadow border-t-4 border-red-500">
                        <h3 class="text-sm font-black uppercase tracking-widest text-slate-800 mb-6">Salida de Dinero</h3>
                        <form id="expense-form" class="space-y-4">
                            <input type="text" id="exp-desc" required placeholder="Concepto del gasto" class="w-full px-5 py-4 input-custom rounded-xl font-bold">
                            <input type="number" id="exp-monto" required placeholder="Monto $" class="w-full px-5 py-4 input-custom rounded-xl font-black text-red-600">
                            <button type="submit" class="w-full py-4 bg-red-500 text-white font-bold rounded-2xl">Confirmar Gasto</button>
                        </form>
                    </div>
                </div>

                <!-- Lista -->
                <div class="lg:col-span-8">
                    <div class="bg-white rounded-[2rem] card-shadow overflow-hidden">
                        <div class="bg-slate-50 px-8 py-5 border-b border-slate-100 flex justify-between items-center">
                            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500">Pedidos Activos</h3>
                            <button onclick="cerrarMes()" class="text-[10px] font-bold bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">CERRAR MES ACTUAL</button>
                        </div>
                        <div id="lista-pedidos" class="divide-y divide-slate-50 min-h-[400px]">
                            <!-- Se llena dinámicamente -->
                        </div>
                    </div>

                    <div class="mt-8 bg-white rounded-[2rem] card-shadow p-8">
                         <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6">Historial del Mes</h3>
                         <div class="overflow-x-auto">
                             <table class="w-full text-left text-sm">
                                 <thead class="text-slate-400 font-bold border-b">
                                     <tr>
                                         <th class="pb-4">Fecha</th>
                                         <th class="pb-4">Detalle</th>
                                         <th class="pb-4 text-right">Monto</th>
                                     </tr>
                                 </thead>
                                 <tbody id="historial-tabla" class="divide-y divide-slate-50">
                                     <!-- Se llena dinámicamente -->
                                 </tbody>
                             </table>
                         </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CLAVE = "1234";
        
        // Estado Global
        let db = {
            pedidos: JSON.parse(localStorage.getItem('pa_pedidos')) || [],
            historial: JSON.parse(localStorage.getItem('pa_historial')) || [],
            caja: parseFloat(localStorage.getItem('pa_caja')) || 0
        };

        // --- SISTEMA DE AUTENTICACIÓN ---
        const loginForm = document.getElementById('login-form');
        const loginScreen = document.getElementById('login-screen');
        const appContent = document.getElementById('app-content');
        const passInput = document.getElementById('password-input');
        const loginError = document.getElementById('login-error');

        function checkAuth() {
            const isAuth = sessionStorage.getItem('pa_auth') === 'true';
            if (isAuth) {
                loginScreen.style.display = 'none';
                appContent.style.display = 'block';
                render();
            } else {
                loginScreen.style.display = 'flex';
                appContent.style.display = 'none';
            }
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (passInput.value === CLAVE) {
                sessionStorage.setItem('pa_auth', 'true');
                loginError.classList.add('hidden');
                checkAuth();
            } else {
                loginError.classList.remove('hidden');
                passInput.value = "";
                passInput.focus();
            }
        });

        function logout() {
            sessionStorage.removeItem('pa_auth');
            location.reload();
        }

        // --- LÓGICA DE NEGOCIO ---
        function save() {
            localStorage.setItem('pa_pedidos', JSON.stringify(db.pedidos));
            localStorage.setItem('pa_historial', JSON.stringify(db.historial));
            localStorage.setItem('pa_caja', db.caja.toString());
        }

        document.getElementById('order-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const nuevo = {
                id: Date.now(),
                cliente: document.getElementById('cliente').value,
                producto: document.getElementById('producto').value,
                monto: parseFloat(document.getElementById('monto').value),
                tipo: document.getElementById('tipo').value,
                fecha: new Date().toLocaleString()
            };
            db.pedidos.push(nuevo);
            save();
            render();
            e.target.reset();
        });

        document.getElementById('expense-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const gasto = {
                id: Date.now(),
                desc: document.getElementById('exp-desc').value,
                monto: parseFloat(document.getElementById('exp-monto').value),
                tipo: 'EGRESO',
                fecha: new Date().toLocaleString()
            };
            db.historial.push(gasto);
            save();
            render();
            e.target.reset();
        });

        function cobrar(id) {
            const index = db.pedidos.findIndex(p => p.id === id);
            const p = db.pedidos[index];
            db.historial.push({ ...p, tipo: 'INGRESO' });
            db.pedidos.splice(index, 1);
            save();
            render();
        }

        function cerrarMes() {
            if(!confirm("¿Deseas cerrar el mes? El balance pasará a la Caja Fuerte.")) return;
            let balance = 0;
            db.historial.forEach(h => {
                if(h.tipo === 'INGRESO') balance += h.monto;
                else balance -= h.monto;
            });
            db.caja += balance;
            db.historial = [];
            save();
            render();
            alert("Mes cerrado. Saldo transferido a la caja.");
        }

        // --- RENDER ---
        function render() {
            const lista = document.getElementById('lista-pedidos');
            const tabla = document.getElementById('historial-tabla');
            
            lista.innerHTML = '';
            tabla.innerHTML = '';

            let totalV = 0, totalG = 0;

            db.pedidos.forEach(p => {
                lista.innerHTML += `
                    <div class="flex items-center justify-between px-8 py-6 hover:bg-slate-50 transition-colors">
                        <div>
                            <p class="font-black text-slate-800 uppercase text-sm">${p.cliente}</p>
                            <p class="text-xs text-slate-400 font-bold">${p.producto} • <span class="text-blue-500">${p.tipo}</span></p>
                        </div>
                        <div class="flex items-center gap-6">
                            <span class="text-lg font-black text-slate-900">$${p.monto.toLocaleString()}</span>
                            <button onclick="cobrar(${p.id})" class="bg-green-500 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-green-600">Cobrar</button>
                        </div>
                    </div>
                `;
            });

            db.historial.forEach(h => {
                const isIngreso = h.tipo === 'INGRESO';
                if(isIngreso) totalV += h.monto; else totalG += h.monto;
                
                tabla.innerHTML += `
                    <tr>
                        <td class="py-4 text-slate-400 text-xs">${h.fecha.split(',')[0]}</td>
                        <td class="py-4 font-bold text-slate-700 uppercase text-xs">${isIngreso ? h.cliente : h.desc}</td>
                        <td class="py-4 text-right font-black ${isIngreso ? 'text-green-600' : 'text-red-500'}">
                            ${isIngreso ? '+' : '-'}$${h.monto.toLocaleString()}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('stat-ventas').innerText = `$${totalV.toLocaleString()}`;
            document.getElementById('stat-gastos').innerText = `$${totalG.toLocaleString()}`;
            document.getElementById('stat-pendientes').innerText = db.pedidos.length;
            document.getElementById('stat-caja').innerText = `$${db.caja.toLocaleString()}`;
        }

        // Reloj
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Inicializar
        checkAuth();
    </script>
</body>
</html>
