<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asociados P Y A - Gestión de Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .order-container { max-height: 500px; overflow-y: auto; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .modal-overlay { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-screen" class="fixed inset-0 bg-blue-600 flex items-center justify-center z-[200] px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full fade-in">
            <div class="text-center mb-8">
                <div class="bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-briefcase text-2xl"></i>
                </div>
                <h1 class="text-2xl font-black text-gray-900">Asociados P Y A</h1>
                <p class="text-gray-500 text-xs font-bold uppercase mt-1 tracking-widest">Panel de Gestión</p>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="password" id="password-input" required placeholder="Contraseña" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-center text-lg tracking-widest">
                <p id="login-error" class="text-red-500 text-[10px] font-bold text-center hidden uppercase">Contraseña incorrecta</p>
                <button type="submit" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-all shadow-lg uppercase text-xs">Entrar al Sistema</button>
            </form>
        </div>
    </div>

    <div id="app-content" class="max-w-7xl mx-auto hidden">
        <header class="mb-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                <h1 class="text-3xl font-black text-gray-900 flex items-center gap-3">
                    <div class="bg-blue-600 text-white p-2 rounded-lg shadow-md"><i class="fas fa-briefcase"></i></div>
                    Asociados P Y A
                </h1>
                <div class="flex items-center gap-3">
                    <button onclick="confirmarCierreMes()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg">Cerrar Mes</button>
                    <button onclick="cerrarSesion()" class="text-gray-400 hover:text-red-500"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-green-500">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Ingresos Netos</p>
                    <p id="total-ingresos" class="text-xl font-bold text-green-600">$0.00</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-red-500">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Gastos</p>
                    <p id="total-egresos" class="text-xl font-bold text-red-600">$0.00</p>
                </div>
                <div class="bg-blue-50 p-5 rounded-2xl shadow-sm border-l-4 border-blue-600">
                    <p class="text-[10px] text-blue-400 uppercase font-bold">Balance</p>
                    <p id="total-balance" class="text-xl font-bold text-blue-700">$0.00</p>
                </div>
                <div class="bg-slate-900 p-5 rounded-2xl shadow-xl text-white border-l-4 border-yellow-500">
                    <p class="text-[9px] text-yellow-500 uppercase font-bold">Reserva Histórica</p>
                    <p id="total-caja-fuerte" class="text-xl font-bold">$0.00</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <section class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-lg font-semibold mb-4 text-blue-700"><i class="fas fa-plus-circle mr-2"></i>Nuevo Pedido</h2>
                    <form id="order-form" class="space-y-4">
                        <input type="text" id="cliente" required placeholder="Cliente" class="w-full p-2 bg-gray-50 border rounded-lg text-sm">
                        <input type="text" id="nombre-pedido" required placeholder="Detalle del pedido" class="w-full p-2 bg-gray-50 border rounded-lg text-sm">
                        <input type="number" step="0.01" id="monto-real" required placeholder="Monto $" class="w-full p-2 bg-gray-50 border rounded-lg font-bold text-blue-600">
                        <div class="flex gap-2">
                            <label class="flex-1 p-2 bg-gray-50 border rounded-lg text-center cursor-pointer has-[:checked]:bg-blue-50">
                                <input type="radio" name="tipo-retiro" value="Retiro" checked class="hidden"> <span class="text-[9px] font-bold">RETIRO</span>
                            </label>
                            <label class="flex-1 p-2 bg-gray-50 border rounded-lg text-center cursor-pointer has-[:checked]:bg-blue-50">
                                <input type="radio" name="tipo-retiro" value="Domicilio" class="hidden"> <span class="text-[9px] font-bold">ENVÍO</span>
                            </label>
                        </div>
                        <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl uppercase text-[10px]">Registrar</button>
                    </form>
                </section>

                <section class="bg-white p-6 rounded-2xl shadow-md">
                    <h2 class="text-lg font-semibold mb-4 text-red-700"><i class="fas fa-wallet mr-2"></i>Gasto Extra</h2>
                    <form id="egreso-form" class="space-y-4">
                        <input type="text" id="egreso-motivo" required placeholder="Motivo" class="w-full p-2 bg-gray-50 border rounded-lg text-sm">
                        <input type="number" step="0.01" id="egreso-monto-real" required placeholder="Monto $" class="w-full p-2 bg-gray-50 border rounded-lg font-bold text-red-600">
                        <button type="submit" class="w-full py-3 bg-red-600 text-white font-bold rounded-xl uppercase text-[10px]">Descontar</button>
                    </form>
                </section>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <section class="bg-slate-800 rounded-3xl shadow-2xl overflow-hidden">
                    <div class="p-4 bg-slate-900 text-white flex justify-between items-center">
                        <span class="text-xs font-bold uppercase">Pedidos en Curso</span>
                        <span id="badge-pendientes" class="bg-blue-600 px-2 py-1 rounded text-[10px]">0</span>
                    </div>
                    <div id="bandeja-gestion" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto"></div>
                </section>

                <section class="bg-white rounded-3xl shadow-md overflow-hidden">
                    <div class="flex border-b bg-gray-50">
                        <button onclick="cambiarPestana('ingresos')" id="btn-tab-ingresos" class="flex-1 py-4 text-[10px] font-bold tab-active">INGRESOS</button>
                        <button onclick="cambiarPestana('egresos')" id="btn-tab-egresos" class="flex-1 py-4 text-[10px] font-bold text-gray-400">EGRESOS</button>
                    </div>
                    <div id="cont-ingresos" class="order-container">
                        <table class="w-full text-left text-xs"><tbody id="lista-ingresos" class="divide-y divide-gray-50"></tbody></table>
                    </div>
                    <div id="cont-egresos" class="order-container hidden">
                        <table class="w-full text-left text-xs"><tbody id="lista-egresos" class="divide-y divide-gray-50"></tbody></table>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="modal-cierre" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
            <h3 class="text-xl font-bold">¿Cerrar el mes?</h3>
            <p class="text-sm text-gray-500 mt-2">Los datos se borrarán y el balance irá a Reserva Histórica.</p>
            <div class="flex gap-2 mt-6">
                <button onclick="document.getElementById('modal-cierre').classList.add('hidden')" class="flex-1 p-3 bg-gray-100 rounded-xl font-bold">NO</button>
                <button onclick="ejecutarCierreMes()" class="flex-1 p-3 bg-blue-600 text-white rounded-xl font-bold">SÍ, CERRAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://asociadospya-29fd6-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const SECRET_PASSWORD = "1234";

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('password-input').value;
            if (pass === SECRET_PASSWORD) {
                sessionStorage.setItem('asociados_auth', 'true');
                verificarAuth();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        function verificarAuth() {
            const isAuth = sessionStorage.getItem('asociados_auth') === 'true';
            document.getElementById('login-screen').classList.toggle('hidden', isAuth);
            document.getElementById('app-content').classList.toggle('hidden', !isAuth);
        }

        function cerrarSesion() {
            sessionStorage.removeItem('asociados_auth');
            location.reload();
        }

        function formatCurrency(num) { return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2 }); }

        db.ref().on('value', (snapshot) => {
            const data = snapshot.val() || {};
            renderizarTodo(data);
        });

        document.getElementById('order-form').addEventListener('submit', (e) => {
            e.preventDefault();
            db.ref('pedidosActivos').push({
                cliente: document.getElementById('cliente').value,
                detalle: document.getElementById('nombre-pedido').value,
                monto: parseFloat(document.getElementById('monto-real').value),
                entrega: document.querySelector('input[name="tipo-retiro"]:checked').value,
                fecha: new Date().toLocaleString()
            });
            e.target.reset();
        });

        document.getElementById('egreso-form').addEventListener('submit', (e) => {
            e.preventDefault();
            db.ref('historial').push({ 
                tipo: 'EGRESO', 
                descripcion: document.getElementById('egreso-motivo').value, 
                monto: parseFloat(document.getElementById('egreso-monto-real').value), 
                fecha: new Date().toLocaleString() 
            });
            e.target.reset();
        });

        function cobrarPedido(key, p) {
            db.ref('historial').push({ ...p, tipo: 'INGRESO' });
            db.ref('pedidosActivos/' + key).remove();
        }

        function borrarPedido(key) { if(confirm('¿Borrar pedido?')) db.ref('pedidosActivos/' + key).remove(); }

        function ejecutarCierreMes() {
            db.ref().once('value', (snapshot) => {
                const data = snapshot.val() || {};
                const historial = data.historial || {};
                let balance = 0;
                Object.values(historial).forEach(h => {
                    if(h.tipo === 'INGRESO') balance += h.monto;
                    else balance -= h.monto;
                });
                db.ref('cajaFuerte').set((data.cajaFuerte || 0) + balance);
                db.ref('historial').remove();
                document.getElementById('modal-cierre').classList.add('hidden');
            });
        }

        function renderizarTodo(data) {
            const bandeja = document.getElementById('bandeja-gestion');
            const lIng = document.getElementById('lista-ingresos');
            const lEgr = document.getElementById('lista-egresos');
            bandeja.innerHTML = ''; lIng.innerHTML = ''; lEgr.innerHTML = '';
            let tIng = 0, tEgr = 0;

            const pedidos = data.pedidosActivos || {};
            Object.keys(pedidos).forEach(key => {
                const p = pedidos[key];
                const div = document.createElement('div');
                div.className = "bg-slate-700 p-4 rounded-xl text-white shadow-lg border border-slate-600";
                div.innerHTML = `
                    <h3 class="font-bold text-sm uppercase">${p.cliente}</h3>
                    <p class="text-[10px] text-slate-300 mb-2">${p.detalle}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-green-400 font-bold">$${formatCurrency(p.monto)}</span>
                        <div class="flex gap-2">
                            <button onclick="borrarPedido('${key}')" class="text-slate-400"><i class="fas fa-trash"></i></button>
                            <button onclick='cobrarPedido("${key}", ${JSON.stringify(p)})' class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold uppercase">Cobrar</button>
                        </div>
                    </div>`;
                bandeja.appendChild(div);
            });

            const historial = data.historial || {};
            Object.values(historial).forEach(h => {
                const tr = document.createElement('tr');
                if(h.tipo === 'INGRESO') {
                    tIng += h.monto;
                    tr.innerHTML = `<td class="p-3 font-bold uppercase">${h.cliente}</td><td class="p-3 text-right text-green-600 font-bold">$${formatCurrency(h.monto)}</td>`;
                    lIng.appendChild(tr);
                } else {
                    tEgr += h.monto;
                    tr.innerHTML = `<td class="p-3 uppercase">${h.descripcion}</td><td class="p-3 text-right text-red-600 font-bold">-$${formatCurrency(h.monto)}</td>`;
                    lEgr.appendChild(tr);
                }
            });

            document.getElementById('total-ingresos').innerText = `$${formatCurrency(tIng)}`;
            document.getElementById('total-egresos').innerText = `$${formatCurrency(tEgr)}`;
            document.getElementById('total-balance').innerText = `$${formatCurrency(tIng - tEgr)}`;
            document.getElementById('total-caja-fuerte').innerText = `$${formatCurrency(data.cajaFuerte || 0)}`;
            document.getElementById('badge-pendientes').innerText = Object.keys(pedidos).length;
        }

        function cambiarPestana(t) {
            document.getElementById('cont-ingresos').classList.toggle('hidden', t !== 'ingresos');
            document.getElementById('cont-egresos').classList.toggle('hidden', t !== 'egresos');
            document.getElementById('btn-tab-ingresos').classList.toggle('tab-active', t === 'ingresos');
            document.getElementById('btn-tab-egresos').classList.toggle('tab-active', t === 'egresos');
        }

        function confirmarCierreMes() { document.getElementById('modal-cierre').classList.remove('hidden'); }
        
        verificarAuth();
    </script>
</body>
</html>
