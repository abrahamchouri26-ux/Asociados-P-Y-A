<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asociados P&A - Sistema</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--line:#e5e7eb;--panel:#111827;--panel2:#1f2937;--text:#111827;--muted:#6b7280;--primary:#2563eb;--secondary:#64748b;--danger:#dc2626;--success:#059669;--warning:#d97706}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    .hidden{display:none!important}.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{width:100%;max-width:430px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:0 16px 40px rgba(0,0,0,.08)}
    .login-card h1{margin:0 0 6px;font-size:34px}.login-card p{margin:0 0 16px}
    .app{display:flex;min-height:100vh}.sidebar{width:250px;background:var(--panel);color:#fff;padding:18px;display:flex;flex-direction:column;gap:10px}
    .sidebar h2{margin:0 0 4px;font-size:24px}.small{font-size:12px}.muted{color:var(--muted)} .sidebar .muted{color:#cbd5e1}
    .sidebar button{border:none;background:var(--panel2);color:#fff;padding:12px;border-radius:12px;cursor:pointer;text-align:left;font-size:14px}
    .sidebar button:hover,.sidebar button.active{background:var(--primary)} .sidebar .logout-btn{margin-top:auto;background:#7f1d1d}
    .content{flex:1;padding:24px}.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
    .page-header h1,.page-header h2{margin:0}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:18px}
    .cards.two{grid-template-columns:repeat(2,minmax(180px,1fr))}.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
    .card h3{margin:0 0 10px;font-size:16px}.card p{margin:0;font-size:28px;font-weight:700}
    .filters,.grid-form,.mini-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;background:var(--card);border:1px solid var(--line);padding:16px;border-radius:16px;margin-bottom:16px}
    .grid-form .full,.mini-form .full{grid-column:1/-1}
    label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted)} input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff}
    button{border:none;background:var(--primary);color:#fff;padding:11px 14px;border-radius:12px;cursor:pointer;font-size:14px}
    button.secondary{background:var(--secondary)} button.danger{background:var(--danger)} .table-wrap{overflow:auto} table{width:100%;border-collapse:collapse}
    th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
    .badge{display:inline-block;border:1px solid var(--line);padding:4px 8px;border-radius:999px;font-size:12px;background:#f8fafc}
    @media(max-width:720px){.app{display:block}.sidebar{width:auto}.content{padding:16px}}
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

<div id="loginView" class="login-wrap">
  <div class="login-card">
    <h1>Asociados P&A</h1>
    <p class="muted">Gestión de Ventas</p>
    <label>Correo</label>
    <input id="loginEmail" type="email" placeholder="admin@asociadospa.cl">
    <label>Contraseña</label>
    <input id="loginPassword" type="password" placeholder="••••••••">
    <button id="loginBtn">Ingresar</button>
    <p id="loginMsg" style="color:red; font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="appView" class="app hidden">
  <aside class="sidebar">
    <div><h2>Asociados P&A</h2><p class="small" id="userInfoLabel">Admin</p></div>
    <button class="nav-btn active" data-page="dashboardPage">Dashboard</button>
    <button class="nav-btn" data-page="pedidosPage">Pedidos</button>
    <button class="nav-btn" data-page="nuevoPedidoPage">Nuevo Pedido</button>
    <button class="nav-btn" data-page="gastosPage">Gastos</button>
    <button class="nav-btn" data-page="comisionesPage">Comisiones</button>
    <button id="logoutBtn" class="danger logout-btn">Cerrar sesión</button>
  </aside>

  <main class="content">
    <section id="dashboardPage" class="page">
      <div class="page-header"><h1>Dashboard</h1></div>
      <div class="cards">
        <div class="card"><h3>Caja Fuerte</h3><p id="dashCaja">$0</p></div>
        <div class="card"><h3>Pedidos Hoy</h3><p id="dashHoy">0</p></div>
      </div>
      <div class="panel">
        <h2>Producción del día</h2>
        <div class="table-wrap"><table><thead><tr><th>N°</th><th>Cliente</th><th>Estado</th></tr></thead><tbody id="tablaHoy"></tbody></table></div>
      </div>
    </section>

    <section id="nuevoPedidoPage" class="page hidden">
        <div class="page-header"><h1>Nuevo Pedido</h1></div>
        <div class="grid-form">
            <input type="text" id="cliente" placeholder="Nombre Cliente">
            <input type="number" id="valorPedido" placeholder="Monto" value="0">
            <button id="btnGuardar">Guardar Pedido</button>
        </div>
    </section>
  </main>
</div>

<script>
  // CONFIGURACIÓN DE TU FIREBASE (Mantenemos tu URL de las fotos)
  const firebaseConfig = {
    databaseURL: "https://asociadospya-29fd6-default-rtdb.firebaseio.com/"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const $ = (id) => document.getElementById(id);

  // Lógica de Login básica (puedes cambiar la clave aquí)
  $("loginBtn").onclick = () => {
    if ($("loginEmail").value === "admin@asociadospa.cl" && $("loginPassword").value === "123456") {
      $("loginView").classList.add("hidden");
      $("appView").classList.remove("hidden");
      escucharDatos();
    } else {
      $("loginMsg").textContent = "Credenciales incorrectas";
    }
  };

  // Función para leer datos de Firebase en tiempo real
  function escucharDatos() {
    db.ref("cajaFuerte").on("value", (snap) => {
      const valor = snap.val() || 0;
      $("dashCaja").textContent = "$" + Number(valor).toLocaleString("es-CL");
    });
  }

  // Navegación simple
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
      $(btn.dataset.page).classList.remove("hidden");
    };
  });

  $("logoutBtn").onclick = () => location.reload();

</script>
</body>
</html>
